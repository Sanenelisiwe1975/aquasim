version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: aquasim-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - aquasim-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: aquasim-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    networks:
      - aquasim-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: aquasim-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - aquasim-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:15-alpine
    container_name: aquasim-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aquasim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aquasim_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aquasim}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aquasim-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aquasim}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Application ─────────────────────────────────────────────────────────────

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: aquasim-engine
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://aquasim:aquasim_secret@postgres:5432/aquasim
      - MODE=${MODE:-live}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Tell init_db() where to find alembic.ini inside the container
      - MIGRATIONS_DIR=/app/migrations
    volumes:
      # Backtest CSV — required when MODE=backtest
      - ./data:/app/data:ro
      # Alembic migration scripts — kept outside the engine image so schema
      # changes don't require rebuilding the container
      - ./migrations:/app/migrations:ro
    networks:
      - aquasim-net
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: aquasim-api
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://aquasim:aquasim_secret@postgres:5432/aquasim
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - aquasim-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aquasim-frontend
    depends_on:
      - api
    ports:
      - "3000:80"
    networks:
      - aquasim-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  aquasim-net:
    driver: bridge
